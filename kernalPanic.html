<html>
    <head>
        <title>KERNEL PANIC!</title>
        <link rel="stylesheet" href="css/styleE.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@700&family=Doto:wght@700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    </head>
    <style>
        body{
            background-color: #0000aa;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='50' height='20'><text x='1' y='10' fill='rgba(255,255,255,0.25)' font-size='10' font-weight='bold'>ERROR</text></svg>");
            background-repeat: repeat;
            overflow: hidden;
            margin: 0px;
            padding: 0px;
        }
        .kp {
            font-family: "Instrument Serif";
            font-size: 5vw;
            position: relative;
            left: 1%;
            top: 0%;
            padding: 0%;
            margin: 0%;
            display: grid;
            color: #ffffff;
        }

        .errorText {
            display: grid;
            font-family: "Instrument Serif";
            font-size: 1.5vw;
            position: relative;
            left: 1%;
            top: 0%;
            padding: 0%;
            margin: 0%;
            margin-inline: auto;
            color: #ffffff;
        }

        a {
            color: #ffffff;
        }
    </style>
    <body>
        <span class="kp">KERNEL PANIC!</span>
        <span class="errorText">The computer was unable to process this page, Please</span>
        <span class="errorText"><a href="index.html">go back.</a></span>
    </body>
</html>
